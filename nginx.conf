server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long-cache the fingerprinted Vite assets — safe because filenames change
    # on every rebuild.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # React Router SPA fallback — any unmatched path serves index.html so the
    # client-side router can handle it. Without this, direct hits to
    # /candidates, /settings, /login etc. return 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "DENY"        always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy   "strict-origin-when-cross-origin" always;
}
